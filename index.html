<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORMA — Modern Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #181818;
    --surface2: #222222;
    --accent: #e8c97e;
    --accent2: #c5a55a;
    --text: #f0ece4;
    --muted: #888;
    --border: #2e2e2e;
    --success: #6fcf97;
    --danger: #eb5757;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(14,14,14,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px; height: 68px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem; font-weight: 900;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
  }

  nav { display: flex; gap: 32px; }
  nav a {
    font-size: 0.82rem; font-weight: 500; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted);
    cursor: pointer; text-decoration: none;
    transition: color 0.2s;
  }
  nav a:hover, nav a.active { color: var(--text); }

  .header-right { display: flex; align-items: center; gap: 20px; }

  .cart-btn {
    position: relative; background: var(--surface2);
    border: 1px solid var(--border); color: var(--text);
    padding: 8px 18px; border-radius: 4px;
    font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
    font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 8px;
  }
  .cart-btn:hover { background: var(--surface); border-color: var(--accent); color: var(--accent); }

  .cart-badge {
    background: var(--accent); color: #0e0e0e;
    border-radius: 50%; width: 18px; height: 18px;
    font-size: 0.7rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    display: none;
  }
  .cart-badge.visible { display: flex; }

  /* HERO */
  .hero {
    padding: 80px 40px 60px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 60px;
    align-items: center; max-width: 1200px; margin: 0 auto;
  }
  .hero-text h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 5vw, 4rem); font-weight: 900;
    line-height: 1.1; margin-bottom: 20px;
    background: linear-gradient(135deg, var(--text) 40%, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .hero-text p { color: var(--muted); line-height: 1.7; font-size: 1rem; max-width: 400px; }
  .hero-img {
    background: var(--surface);
    border-radius: 12px; height: 340px;
    display: flex; align-items: center; justify-content: center;
    font-size: 5rem; border: 1px solid var(--border);
    position: relative; overflow: hidden;
  }
  .hero-img::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 70% 30%, rgba(232,201,126,0.08) 0%, transparent 70%);
  }

  /* SECTION */
  .section { max-width: 1200px; margin: 0 auto; padding: 0 40px 80px; }
  .section-header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 36px;
    border-bottom: 1px solid var(--border); padding-bottom: 16px;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem; font-weight: 700;
  }
  .section-sub { color: var(--muted); font-size: 0.85rem; letter-spacing: 0.06em; text-transform: uppercase; }

  /* FILTERS */
  .filters { display: flex; gap: 10px; margin-bottom: 28px; flex-wrap: wrap; }
  .filter-btn {
    padding: 6px 16px; border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    font-family: 'DM Sans', sans-serif; font-size: 0.8rem;
    font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--accent); color: #0e0e0e;
    border-color: var(--accent);
  }

  /* PRODUCTS GRID */
  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 24px;
  }

  .product-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;
    transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
    cursor: pointer;
  }
  .product-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    border-color: rgba(232,201,126,0.3);
  }

  .product-img {
    height: 220px; display: flex; align-items: center; justify-content: center;
    font-size: 3.5rem; position: relative; overflow: hidden;
    background: var(--surface2);
  }
  .product-img::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.3));
  }

  .product-badge {
    position: absolute; top: 12px; left: 12px; z-index: 2;
    background: var(--accent); color: #0e0e0e;
    font-size: 0.68rem; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; padding: 3px 8px; border-radius: 3px;
  }

  .product-info { padding: 18px; }
  .product-category {
    font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--accent); margin-bottom: 6px;
  }
  .product-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem; font-weight: 700; margin-bottom: 8px;
    line-height: 1.3;
  }
  .product-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.5; margin-bottom: 14px; }
  .product-footer { display: flex; align-items: center; justify-content: space-between; }
  .product-price {
    font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700;
  }
  .product-price .old { text-decoration: line-through; color: var(--muted); font-size: 0.85rem; margin-right: 6px; font-family: 'DM Sans', sans-serif; font-weight: 400; }

  .add-btn {
    background: var(--accent); color: #0e0e0e;
    border: none; border-radius: 5px;
    padding: 8px 16px; font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; cursor: pointer;
    transition: all 0.2s;
  }
  .add-btn:hover { background: var(--accent2); transform: scale(1.03); }
  .add-btn.added { background: var(--success); color: #0e0e0e; }

  /* CART SIDEBAR */
  .cart-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 200; opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .cart-overlay.open { opacity: 1; pointer-events: all; }

  .cart-sidebar {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 420px; background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 201; display: flex; flex-direction: column;
    transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    overflow: hidden;
  }
  .cart-sidebar.open { transform: translateX(0); }

  .cart-header {
    padding: 24px 28px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .cart-title {
    font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700;
  }
  .close-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); width: 34px; height: 34px;
    border-radius: 50%; cursor: pointer; font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .close-btn:hover { border-color: var(--danger); color: var(--danger); }

  .cart-items { flex: 1; overflow-y: auto; padding: 20px 28px; }
  .cart-items::-webkit-scrollbar { width: 4px; }
  .cart-items::-webkit-scrollbar-track { background: transparent; }
  .cart-items::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .cart-empty { text-align: center; padding: 60px 0; color: var(--muted); }
  .cart-empty .icon { font-size: 3rem; margin-bottom: 16px; }
  .cart-empty p { font-size: 0.9rem; }

  .cart-item {
    display: flex; gap: 14px; padding: 14px 0;
    border-bottom: 1px solid var(--border); align-items: flex-start;
  }
  .cart-item-icon {
    width: 56px; height: 56px; background: var(--surface2);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem; flex-shrink: 0; border: 1px solid var(--border);
  }
  .cart-item-details { flex: 1; }
  .cart-item-name { font-size: 0.9rem; font-weight: 500; margin-bottom: 4px; }
  .cart-item-price { font-size: 0.85rem; color: var(--accent); margin-bottom: 10px; }
  .qty-control {
    display: flex; align-items: center; gap: 10px;
  }
  .qty-btn {
    width: 26px; height: 26px; border-radius: 4px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); cursor: pointer; font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .qty-btn:hover { border-color: var(--accent); color: var(--accent); }
  .qty-num { font-size: 0.9rem; font-weight: 600; min-width: 20px; text-align: center; }
  .remove-btn {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 1rem; padding: 4px;
    transition: color 0.2s; align-self: flex-start;
  }
  .remove-btn:hover { color: var(--danger); }

  .cart-footer {
    padding: 20px 28px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }
  .cart-summary { margin-bottom: 18px; }
  .cart-row {
    display: flex; justify-content: space-between;
    font-size: 0.88rem; margin-bottom: 8px;
  }
  .cart-row.total {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem; font-weight: 700;
    padding-top: 12px; border-top: 1px solid var(--border);
    margin-top: 8px;
  }
  .cart-row .label { color: var(--muted); }
  .checkout-btn {
    width: 100%; padding: 14px;
    background: var(--accent); color: #0e0e0e;
    border: none; border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
  }
  .checkout-btn:hover { background: var(--accent2); }
  .checkout-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* CHECKOUT MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    z-index: 300; display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
    padding: 20px;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; max-width: 540px; width: 100%;
    max-height: 90vh; overflow-y: auto;
    transform: scale(0.95) translateY(20px);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .modal-overlay.open .modal { transform: scale(1) translateY(0); }

  .modal-header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; }
  .modal-body { padding: 28px 32px; }

  .form-group { margin-bottom: 18px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  label { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); display: block; margin-bottom: 6px; }
  input, select {
    width: 100%; padding: 11px 14px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
    transition: border-color 0.2s; outline: none;
  }
  input:focus, select:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }

  .order-summary {
    background: var(--surface2); border-radius: 8px;
    padding: 16px; margin-bottom: 24px; border: 1px solid var(--border);
  }
  .order-summary-title { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 12px; }
  .order-item { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 6px; }
  .order-item span:first-child { color: var(--muted); }
  .order-divider { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
  .order-total { display: flex; justify-content: space-between; font-weight: 700; font-size: 1rem; }

  .place-order-btn {
    width: 100%; padding: 15px;
    background: var(--accent); color: #0e0e0e;
    border: none; border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
  }
  .place-order-btn:hover { background: var(--accent2); transform: translateY(-1px); }

  /* SUCCESS */
  .success-screen {
    text-align: center; padding: 50px 32px 40px;
  }
  .success-icon {
    width: 70px; height: 70px; background: rgba(111,207,151,0.15);
    border: 2px solid var(--success);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 2rem; margin: 0 auto 24px;
  }
  .success-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 900; margin-bottom: 10px; }
  .success-sub { color: var(--muted); margin-bottom: 12px; }
  .order-num { color: var(--accent); font-weight: 600; font-size: 0.9rem; letter-spacing: 0.06em; margin-bottom: 28px; }
  .continue-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 12px 28px; border-radius: 6px;
    font-family: 'DM Sans', sans-serif; font-size: 0.88rem;
    font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
  }
  .continue-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* TOAST */
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface2); border: 1px solid var(--border);
    padding: 12px 24px; border-radius: 30px;
    font-size: 0.85rem; font-weight: 500;
    z-index: 400; opacity: 0;
    transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    display: flex; align-items: center; gap: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast .dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; }

  /* STEPS */
  .checkout-steps {
    display: flex; align-items: center; gap: 0;
    margin-bottom: 28px;
  }
  .step { display: flex; align-items: center; gap: 8px; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.07em; }
  .step-num {
    width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 700;
    background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
  }
  .step.active .step-num { background: var(--accent); border-color: var(--accent); color: #0e0e0e; }
  .step.active { color: var(--text); }
  .step:not(.active) { color: var(--muted); }
  .step-divider { flex: 1; height: 1px; background: var(--border); margin: 0 10px; }

  /* section divider */
  .form-section-label {
    font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--accent); margin-bottom: 14px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  @media (max-width: 768px) {
    header { padding: 0 20px; }
    nav { display: none; }
    .hero { grid-template-columns: 1fr; padding: 40px 20px; gap: 30px; }
    .hero-img { height: 220px; }
    .section { padding: 0 20px 50px; }
    .cart-sidebar { width: 100%; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">Forma</div>
  <nav>
    <a class="active" onclick="scrollToShop()">Shop</a>
    <a>Collections</a>
    <a>About</a>
  </nav>
  <div class="header-right">
    <button class="cart-btn" onclick="openCart()">
      <span>🛒 Cart</span>
      <span class="cart-badge" id="cartBadge">0</span>
    </button>
  </div>
</header>

<!-- HERO -->
<div class="hero">
  <div class="hero-text">
    <h1>Curated Objects for Modern Living</h1>
    <p>Discover our collection of thoughtfully designed products that bring beauty and function to everyday life.</p>
  </div>
  <div class="hero-img">🏺</div>
</div>

<!-- SHOP SECTION -->
<div class="section" id="shop">
  <div class="section-header">
    <h2 class="section-title">Our Collection</h2>
    <span class="section-sub" id="productCount">12 items</span>
  </div>
  <div class="filters" id="filters">
    <button class="filter-btn active" onclick="filterProducts('all', this)">All</button>
    <button class="filter-btn" onclick="filterProducts('home', this)">Home</button>
    <button class="filter-btn" onclick="filterProducts('tech', this)">Tech</button>
    <button class="filter-btn" onclick="filterProducts('wear', this)">Wear</button>
    <button class="filter-btn" onclick="filterProducts('art', this)">Art</button>
  </div>
  <div class="products-grid" id="productsGrid"></div>
</div>

<!-- CART SIDEBAR -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-header">
    <span class="cart-title">Your Cart</span>
    <button class="close-btn" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer" id="cartFooter" style="display:none">
    <div class="cart-summary">
      <div class="cart-row"><span class="label">Subtotal</span><span id="subtotal">$0.00</span></div>
      <div class="cart-row"><span class="label">Shipping</span><span>Free</span></div>
      <div class="cart-row"><span class="label">Tax (8%)</span><span id="tax">$0.00</span></div>
      <div class="cart-row total"><span>Total</span><span id="total">$0.00</span></div>
    </div>
    <button class="checkout-btn" onclick="openCheckout()">Proceed to Checkout</button>
  </div>
</div>

<!-- CHECKOUT MODAL -->
<div class="modal-overlay" id="checkoutModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Checkout</span>
      <button class="close-btn" onclick="closeCheckout()">✕</button>
    </div>
    <div class="modal-body" id="modalBody">
      <!-- dynamically filled -->
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"><span class="dot"></span><span id="toastMsg"></span></div>

<script>
const PRODUCTS = [
  { id:1, name:'Ceramic Vase', category:'home', price:89, emoji:'🏺', desc:'Hand-thrown stoneware with matte glaze finish.', badge:'Bestseller', color:'#4a3728' },
  { id:2, name:'Wool Throw', category:'home', price:145, oldPrice:180, emoji:'🧶', desc:'Merino wool blanket, naturally dyed.', badge:'Sale', color:'#3a2f3a' },
  { id:3, name:'Brass Lamp', category:'home', price:220, emoji:'💡', desc:'Adjustable brass desk lamp, warm glow.', color:'#3a3020' },
  { id:4, name:'Wireless Buds', category:'tech', price:159, oldPrice:200, emoji:'🎧', desc:'Active noise-cancelling, 30hr battery.', badge:'Sale', color:'#1e2a3a' },
  { id:5, name:'Linen Tote', category:'wear', price:68, emoji:'👜', desc:'Heavyweight French linen, natural edge.', color:'#2a3a2f' },
  { id:6, name:'Bamboo Watch', category:'wear', price:195, emoji:'⌚', desc:'Sustainable bamboo case, sapphire glass.', badge:'New', color:'#2a3020' },
  { id:7, name:'Wall Print', category:'art', price:55, emoji:'🖼️', desc:'Fine art giclée print, archival quality.', color:'#2a2a3a' },
  { id:8, name:'Scented Candle', category:'home', price:42, emoji:'🕯️', desc:'Beeswax + soy blend, cedar & vetiver.', color:'#3a2a2a' },
  { id:9, name:'Notebook', category:'art', price:32, emoji:'📓', desc:'Handbound leather cover, Italian paper.', badge:'New', color:'#2a3020' },
  { id:10, name:'Minimal Clock', category:'home', price:175, emoji:'🕐', desc:'Solid oak body, silent mechanism.', color:'#3a3010' },
  { id:11, name:'Desk Plant Kit', category:'home', price:38, emoji:'🌿', desc:'Air-purifying plants with ceramic pots.', color:'#1e3020' },
  { id:12, name:'Smart Mug', category:'tech', price:79, emoji:'☕', desc:'Temperature-controlled, 3hr warmth.', color:'#2a2a2a' },
];

let cart = [];
let currentFilter = 'all';

function renderProducts(filter='all') {
  const grid = document.getElementById('productsGrid');
  const filtered = filter === 'all' ? PRODUCTS : PRODUCTS.filter(p => p.category === filter);
  document.getElementById('productCount').textContent = `${filtered.length} items`;

  grid.innerHTML = filtered.map(p => {
    const inCart = cart.find(c => c.id === p.id);
    return `
      <div class="product-card">
        <div class="product-img" style="background:${p.color}20;">
          ${p.badge ? `<span class="product-badge">${p.badge}</span>` : ''}
          <span style="position:relative;z-index:1">${p.emoji}</span>
        </div>
        <div class="product-info">
          <div class="product-category">${p.category}</div>
          <div class="product-name">${p.name}</div>
          <div class="product-desc">${p.desc}</div>
          <div class="product-footer">
            <div class="product-price">
              ${p.oldPrice ? `<span class="old">$${p.oldPrice}</span>` : ''}$${p.price}
            </div>
            <button class="add-btn ${inCart ? 'added' : ''}" onclick="addToCart(${p.id}, this)" id="addBtn${p.id}">
              ${inCart ? '✓ Added' : '+ Add'}
            </button>
          </div>
        </div>
      </div>`;
  }).join('');
}

function filterProducts(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderProducts(cat);
}

function addToCart(id, btn) {
  const product = PRODUCTS.find(p => p.id === id);
  const existing = cart.find(c => c.id === id);
  if (existing) {
    existing.qty++;
  } else {
    cart.push({ ...product, qty: 1 });
  }
  updateCartUI();
  btn.classList.add('added');
  btn.textContent = '✓ Added';
  showToast(`${product.name} added to cart`);
}

function removeFromCart(id) {
  cart = cart.filter(c => c.id !== id);
  updateCartUI();
  renderCartItems();
}

function updateQty(id, delta) {
  const item = cart.find(c => c.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) { removeFromCart(id); return; }
  updateCartUI();
  renderCartItems();
}

function updateCartUI() {
  const total = cart.reduce((s, c) => s + c.qty, 0);
  const badge = document.getElementById('cartBadge');
  badge.textContent = total;
  badge.classList.toggle('visible', total > 0);
  renderCartItems();
}

function renderCartItems() {
  const container = document.getElementById('cartItems');
  const footer = document.getElementById('cartFooter');

  if (cart.length === 0) {
    container.innerHTML = `<div class="cart-empty"><div class="icon">🛒</div><p>Your cart is empty</p></div>`;
    footer.style.display = 'none';
    return;
  }

  footer.style.display = 'block';
  container.innerHTML = cart.map(item => `
    <div class="cart-item">
      <div class="cart-item-icon">${item.emoji}</div>
      <div class="cart-item-details">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">$${item.price}</div>
        <div class="qty-control">
          <button class="qty-btn" onclick="updateQty(${item.id}, -1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="updateQty(${item.id}, 1)">+</button>
        </div>
      </div>
      <button class="remove-btn" onclick="removeFromCart(${item.id})">✕</button>
    </div>`).join('');

  const subtotal = cart.reduce((s, c) => s + c.price * c.qty, 0);
  const tax = subtotal * 0.08;
  document.getElementById('subtotal').textContent = `$${subtotal.toFixed(2)}`;
  document.getElementById('tax').textContent = `$${tax.toFixed(2)}`;
  document.getElementById('total').textContent = `$${(subtotal + tax).toFixed(2)}`;
}

function openCart() {
  document.getElementById('cartOverlay').classList.add('open');
  document.getElementById('cartSidebar').classList.add('open');
  renderCartItems();
}

function closeCart() {
  document.getElementById('cartOverlay').classList.remove('open');
  document.getElementById('cartSidebar').classList.remove('open');
}

function openCheckout() {
  closeCart();
  showCheckoutForm();
  document.getElementById('checkoutModal').classList.add('open');
}

function closeCheckout() {
  document.getElementById('checkoutModal').classList.remove('open');
}

function showCheckoutForm() {
  const subtotal = cart.reduce((s, c) => s + c.price * c.qty, 0);
  const tax = subtotal * 0.08;
  const total = subtotal + tax;
  document.getElementById('modalTitle').textContent = 'Checkout';
  document.getElementById('modalBody').innerHTML = `
    <div class="checkout-steps">
      <div class="step active"><span class="step-num">1</span> Shipping</div>
      <div class="step-divider"></div>
      <div class="step"><span class="step-num">2</span> Payment</div>
      <div class="step-divider"></div>
      <div class="step"><span class="step-num">3</span> Confirm</div>
    </div>

    <div class="order-summary">
      <div class="order-summary-title">Order Summary</div>
      ${cart.map(i => `<div class="order-item"><span>${i.name} ×${i.qty}</span><span>$${(i.price*i.qty).toFixed(2)}</span></div>`).join('')}
      <hr class="order-divider">
      <div class="order-total"><span>Total (incl. tax)</span><span>$${total.toFixed(2)}</span></div>
    </div>

    <div class="form-section-label">Shipping Information</div>
    <div class="form-row">
      <div class="form-group"><label>First Name</label><input type="text" placeholder="Jane" id="fname"></div>
      <div class="form-group"><label>Last Name</label><input type="text" placeholder="Smith" id="lname"></div>
    </div>
    <div class="form-group"><label>Email</label><input type="email" placeholder="jane@example.com" id="email"></div>
    <div class="form-group"><label>Address</label><input type="text" placeholder="123 Oak Street" id="address"></div>
    <div class="form-row">
      <div class="form-group"><label>City</label><input type="text" placeholder="New York" id="city"></div>
      <div class="form-group"><label>ZIP Code</label><input type="text" placeholder="10001" id="zip"></div>
    </div>

    <div class="form-section-label" style="margin-top:24px">Payment</div>
    <div class="form-group"><label>Card Number</label><input type="text" placeholder="4242 4242 4242 4242" id="cardNum" maxlength="19" oninput="formatCard(this)"></div>
    <div class="form-row">
      <div class="form-group"><label>Expiry</label><input type="text" placeholder="MM / YY" id="expiry" maxlength="7" oninput="formatExpiry(this)"></div>
      <div class="form-group"><label>CVV</label><input type="text" placeholder="123" id="cvv" maxlength="4"></div>
    </div>

    <button class="place-order-btn" onclick="placeOrder()">Place Order — $${total.toFixed(2)}</button>
  `;
}

function formatCard(el) {
  let v = el.value.replace(/\D/g,'').substring(0,16);
  el.value = v.replace(/(.{4})/g,'$1 ').trim();
}

function formatExpiry(el) {
  let v = el.value.replace(/\D/g,'').substring(0,4);
  if (v.length >= 3) v = v.substring(0,2) + ' / ' + v.substring(2);
  el.value = v;
}

function placeOrder() {
  const fields = ['fname','lname','email','address','city','zip','cardNum','expiry','cvv'];
  const empty = fields.some(f => !document.getElementById(f)?.value.trim());
  if (empty) { showToast('Please fill in all fields', true); return; }

  const orderNum = 'FRM-' + Math.random().toString(36).substring(2,8).toUpperCase();
  document.getElementById('modalTitle').textContent = '';
  document.getElementById('modalBody').innerHTML = `
    <div class="success-screen">
      <div class="success-icon">✓</div>
      <div class="success-title">Order Confirmed!</div>
      <div class="success-sub">Thank you for your purchase. Your items are on their way.</div>
      <div class="order-num">Order ${orderNum}</div>
      <p style="color:var(--muted);font-size:0.85rem;margin-bottom:28px">A confirmation has been sent to your email.</p>
      <button class="continue-btn" onclick="finishOrder()">Continue Shopping</button>
    </div>`;

  cart = [];
  updateCartUI();
  // reset product buttons
  renderProducts(currentFilter);
}

function finishOrder() {
  closeCheckout();
  showToast('Thanks for your order! 🎉');
}

function showToast(msg, isError=false) {
  const toast = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  toast.querySelector('.dot').style.background = isError ? 'var(--danger)' : 'var(--success)';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2800);
}

function scrollToShop() {
  document.getElementById('shop').scrollIntoView({ behavior: 'smooth' });
}

// Init
renderProducts();
</script>
</body>
</html>
